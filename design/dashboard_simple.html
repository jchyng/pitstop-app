<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 대시보드 — 소모품 현황 (심플)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#0A0C0F; --surface:#15181E;
    --chip:rgba(255,255,255,.05); --hair:rgba(255,255,255,.07);
    --tx:#F4F6F8; --tx2:#9BA2AC; --tx3:#5E6571;
    --acc:#4FB0F5; --acc-2:#2E9BE6;
    --amber:#FFB020; --amber-bg:rgba(255,176,32,.14);
    --font:"Pretendard","Apple SD Gothic Neo",-apple-system,system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);min-height:100vh;display:flex;align-items:center;
    justify-content:center;padding:40px 16px;
    background:radial-gradient(80% 60% at 50% 18%,#1c2129 0%,#0c0e12 58%,#08090c 100%)}
  .phone{width:390px;height:844px;border-radius:52px;background:#000;padding:11px;
    box-shadow:0 50px 120px -30px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.04);position:relative}
  .screen{width:100%;height:100%;border-radius:42px;overflow:hidden;
    background:radial-gradient(120% 70% at 50% 0%,#191D25 0%,#0B0D11 52%,var(--bg) 100%);
    display:flex;flex-direction:column;position:relative}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:108px;height:30px;background:#000;border-radius:18px;z-index:20}
  .sbar{display:flex;justify-content:space-between;align-items:center;
    padding:16px 30px 4px;font-size:13px;color:var(--tx);font-weight:500}
  .sbar .r{display:flex;gap:7px;align-items:center;font-size:15px}
  .app{flex:1;overflow-y:auto;padding:6px 22px 12px}
  .app::-webkit-scrollbar{display:none}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 0 20px}
  .topbar .lbl{font-size:12px;color:var(--tx3)}
  .ic-btn{width:38px;height:38px;border-radius:50%;background:var(--chip);
    display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:19px}

  .hero{animation:rise .5s both}
  .vname{display:flex;align-items:center;gap:7px}
  .vname h1{font-size:24px;font-weight:500;color:var(--tx);letter-spacing:-.01em}
  .vname i{font-size:18px;color:var(--tx3)}
  .vtrim{font-size:13px;color:var(--tx2);margin-top:3px}
  .odo{margin:24px 0 4px}
  .odo .k{font-size:12px;color:var(--tx3);letter-spacing:.04em}
  .odo .num{display:flex;align-items:baseline;gap:7px;margin-top:6px}
  .odo .num b{font-size:46px;font-weight:500;color:var(--tx);
    letter-spacing:-.03em;line-height:1;font-feature-settings:"tnum" 1}
  .odo .num span{font-size:16px;color:var(--tx2);font-weight:500}

  .sec-h{display:flex;justify-content:space-between;align-items:center;margin:34px 0 6px}
  .sec-h h2{font-size:17px;font-weight:500;color:var(--tx)}
  .sec-h i{font-size:18px;color:var(--tx3)}

  .card{background:var(--surface);border:1px solid var(--hair);
    border-radius:22px;padding:8px 20px;margin-top:14px}
  .item{padding:18px 0;opacity:0;animation:rise .5s both}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .nm{font-size:15px;font-weight:500;color:var(--tx);display:flex;align-items:center;gap:8px}
  .tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:7px;
    background:var(--amber-bg);color:var(--amber)}
  .rem{font-size:14px;color:var(--tx2);white-space:nowrap}
  .rem b{font-size:15px;font-weight:500;color:var(--tx);font-feature-settings:"tnum" 1;margin-right:3px}
  .rem.warn b{color:var(--amber)}
  .track{height:5px;border-radius:3px;background:rgba(255,255,255,.06);margin-top:13px;overflow:hidden}
  .fill{height:100%;border-radius:3px;animation:grow 1s cubic-bezier(.2,.8,.2,1) both}
  .fill.ok{background:linear-gradient(90deg,var(--acc-2),var(--acc))}
  .fill.warn{background:var(--amber)}

  .note{font-size:11px;color:var(--tx3);line-height:1.6;margin:16px 4px 6px}

  .tabbar{height:80px;background:rgba(13,15,19,.92);border-top:1px solid var(--hair);
    display:flex;padding:12px 8px 0;backdrop-filter:blur(20px)}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--tx3);font-size:10px}
  .tab i{font-size:23px}
  .tab.on{color:var(--acc)}

  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes grow{from{width:0}}
  .i1{animation-delay:.06s}.i2{animation-delay:.12s}.i3{animation-delay:.18s}
  .i4{animation-delay:.24s}.i5{animation-delay:.30s}
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="island"></div>
      <div class="sbar">
        <span>9:41</span>
        <span class="r"><i class="ti ti-signal-4g"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span>
      </div>

      <div class="app">
        <div class="topbar">
          <span class="lbl">내 차고</span>
          <div class="ic-btn"><i class="ti ti-settings"></i></div>
        </div>

        <div class="hero">
          <div class="vname"><h1>더 뉴 그랜저</h1><i class="ti ti-chevron-down"></i></div>
          <div class="vtrim">캘리그래피 하이브리드 · 2024</div>
          <div class="odo">
            <div class="k">총 주행거리</div>
            <div class="num"><b>48,250</b><span>km</span></div>
          </div>
        </div>

        <div class="sec-h">
          <h2>소모품 현황</h2>
          <i class="ti ti-chevron-right"></i>
        </div>

        <div class="card">
          <div class="item i1">
            <div class="row">
              <span class="nm">엔진오일 및 필터</span>
              <span class="rem"><b>11,171</b>km 남음</span>
            </div>
            <div class="track"><div class="fill ok" style="width:74%"></div></div>
          </div>
          <div class="item i2">
            <div class="row">
              <span class="nm">에어 클리너 필터</span>
              <span class="rem"><b>36,171</b>km 남음</span>
            </div>
            <div class="track"><div class="fill ok" style="width:90%"></div></div>
          </div>
          <div class="item i3">
            <div class="row">
              <span class="nm">에어컨 필터 <span class="tag">교체 권장</span></span>
              <span class="rem warn"><b>717</b>km 남음</span>
            </div>
            <div class="track"><div class="fill warn" style="width:6%"></div></div>
          </div>
          <div class="item i4">
            <div class="row">
              <span class="nm">브레이크 오일</span>
              <span class="rem"><b>35,717</b>km 남음</span>
            </div>
            <div class="track"><div class="fill ok" style="width:71%"></div></div>
          </div>
          <div class="item i5">
            <div class="row">
              <span class="nm">냉각수</span>
              <span class="rem"><b>185,717</b>km 남음</span>
            </div>
            <div class="track"><div class="fill ok" style="width:93%"></div></div>
          </div>
        </div>

        <p class="note">※ 주행 습관이나 도로 사정에 따라 실제 교체가 필요한 시기가 다를 수 있습니다.</p>
      </div>

      <nav class="tabbar">
        <div class="tab on"><i class="ti ti-home"></i>홈</div>
        <div class="tab"><i class="ti ti-history"></i>정비이력</div>
        <div class="tab"><i class="ti ti-wallet"></i>가계부</div>
        <div class="tab"><i class="ti ti-dots"></i>더보기</div>
      </nav>
    </div>
  </div>
</body>
</html>
